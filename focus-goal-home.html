<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>不鸽目标 - 首页高保真原型</title>
    <style>
      :root {
        --lime: #9bdd10;
        --lime-deep: #7fc800;
        --lime-soft: #ecffd2;
        --blue: #32aaf2;
        --orange: #ff7d12;
        --ink: #070809;
        --muted: #777a80;
        --line: rgba(19, 24, 28, 0.08);
        --panel: rgba(255, 255, 255, 0.94);
        --z-base: 1;
        --z-float: 4;
        --z-nav: 8;
        --z-toast: 12;
        --shadow-sm: 0 5px 14px rgba(28, 35, 42, 0.06);
        --shadow-md: 0 12px 32px rgba(28, 35, 42, 0.09);
        --shadow-lg: 0 24px 72px rgba(31, 37, 46, 0.16);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 28px;
        color: var(--ink);
        background:
          radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.92), transparent 280px),
          linear-gradient(135deg, #eef0f4 0%, #ffffff 44%, #e8ebf0 100%);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        letter-spacing: 0;
      }

      button {
        border: 0;
        padding: 0;
        color: inherit;
        font: inherit;
        background: none;
      }

      .phone-shell {
        position: relative;
        width: 430px;
        height: 932px;
        padding: 12px;
        border-radius: 66px;
        background: #070707;
        box-shadow:
          inset 0 0 0 3px #222,
          inset 0 0 0 8px #050505,
          0 34px 82px rgba(14, 18, 26, 0.22);
      }

      .phone {
        position: relative;
        height: 100%;
        overflow: hidden;
        border-radius: 54px;
        background:
          radial-gradient(circle at 78% 16%, rgba(154, 222, 16, 0.18), transparent 132px),
          radial-gradient(circle at 16% 33%, rgba(255, 255, 255, 0.95), transparent 180px),
          linear-gradient(180deg, #fff 0%, #fbfcfb 62%, #fff 100%);
      }

      .phone::after {
        content: "";
        position: absolute;
        left: 132px;
        top: 18px;
        z-index: var(--z-nav);
        width: 166px;
        height: 36px;
        border-radius: 999px;
        background: #000;
      }

      .status-bar {
        position: relative;
        z-index: var(--z-float);
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 58px;
        padding: 19px 45px 0;
        font-size: 17px;
        font-weight: 900;
      }

      .system-icons {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .signal {
        display: grid;
        grid-template-columns: repeat(4, 4px);
        align-items: end;
        gap: 3px;
        height: 14px;
      }

      .signal i {
        width: 4px;
        border-radius: 4px;
        background: #050505;
      }

      .signal i:nth-child(1) { height: 6px; }
      .signal i:nth-child(2) { height: 9px; }
      .signal i:nth-child(3) { height: 12px; }
      .signal i:nth-child(4) { height: 15px; }

      .wifi {
        position: relative;
        width: 20px;
        height: 14px;
        overflow: hidden;
      }

      .wifi::before,
      .wifi::after {
        content: "";
        position: absolute;
        left: 50%;
        border: 3px solid #050505;
        border-bottom: 0;
        transform: translateX(-50%);
      }

      .wifi::before {
        top: 0;
        width: 25px;
        height: 17px;
        border-radius: 25px 25px 0 0;
      }

      .wifi::after {
        top: 7px;
        width: 12px;
        height: 8px;
        border-radius: 12px 12px 0 0;
      }

      .battery {
        position: relative;
        width: 27px;
        height: 14px;
        border: 2px solid #050505;
        border-radius: 5px;
        padding: 2px;
      }

      .battery::after {
        content: "";
        position: absolute;
        right: -5px;
        top: 4px;
        width: 3px;
        height: 6px;
        border-radius: 0 3px 3px 0;
        background: #050505;
      }

      .battery i {
        display: block;
        width: 78%;
        height: 100%;
        border-radius: 2px;
        background: #050505;
      }

      .page {
        height: calc(100% - 58px);
        overflow-y: auto;
        padding: 6px 22px calc(105px + env(safe-area-inset-bottom));
        scrollbar-width: none;
      }

      .page::-webkit-scrollbar {
        display: none;
      }

      .tap {
        cursor: pointer;
        transition:
          opacity 160ms ease-out,
          transform 160ms ease-out,
          box-shadow 160ms ease-out,
          filter 160ms ease-out;
      }

      .tap:hover {
        transform: translateY(-1px);
        filter: brightness(1.015);
      }

      .tap:active,
      .tap.is-pressed {
        transform: translateY(1px) scale(0.985);
        filter: brightness(0.98);
      }

      .tap:focus-visible {
        outline: 3px solid rgba(154, 221, 16, 0.32);
        outline-offset: 3px;
      }

      .tap:disabled,
      .tap[aria-disabled="true"] {
        cursor: default;
        opacity: 0.48;
        transform: none;
        filter: grayscale(0.18);
        box-shadow: none;
      }

      .brand-row,
      .hero,
      .section-title,
      .plan-row,
      .bottom-nav {
        position: relative;
        z-index: var(--z-base);
      }

      .brand-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 4px;
      }

      .brand-lockup {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .avatar {
        width: 30px;
        height: 30px;
        overflow: hidden;
        border-radius: 9px;
        background: #dff6ff;
        box-shadow: var(--shadow-sm);
      }

      .avatar img {
        width: 44px;
        max-width: none;
        margin: -7px 0 0 -7px;
      }

      .brand {
        margin: 0;
        font-size: 22px;
        font-weight: 950;
        line-height: 1.12;
        text-wrap: balance;
      }

      .spark {
        display: inline-block;
        width: 12px;
        height: 12px;
        margin-left: 3px;
        background: var(--lime);
        clip-path: polygon(50% 0, 62% 38%, 100% 50%, 62% 62%, 50% 100%, 38% 62%, 0 50%, 38% 38%);
      }

      .icon-btn {
        position: relative;
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: var(--shadow-sm);
      }

      .icon-btn svg,
      .hugeicon {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.9;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .dot {
        position: absolute;
        right: 8px;
        top: 8px;
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #ff6517;
      }

      .hero {
        min-height: 142px;
        padding-top: 44px;
      }

      .hero h2 {
        margin: 0 0 10px;
        font-size: 27px;
        font-weight: 950;
        line-height: 1.12;
        text-wrap: balance;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        font-weight: 600;
        line-height: 1.45;
        text-wrap: pretty;
      }

      .hero-mascot {
        position: absolute;
        right: -3px;
        bottom: -1px;
        width: 166px;
        pointer-events: none;
      }

      .halo {
        position: absolute;
        right: -2px;
        bottom: 24px;
        width: 98px;
        height: 98px;
        border-radius: 50%;
        background:
          radial-gradient(circle, transparent 0 24px, #fff 25px 27px, transparent 28px 42px, #fff 43px 45px, transparent 46px),
          var(--lime);
      }

      .goal-card {
        position: relative;
        z-index: var(--z-float);
        display: grid;
        grid-template-columns: minmax(0, 1fr) 124px;
        column-gap: 4px;
        min-height: 154px;
        overflow: hidden;
        padding: 20px 18px 18px;
        border-radius: 18px;
        background:
          radial-gradient(circle at 87% 18%, rgba(255, 255, 255, 0.85), transparent 84px),
          linear-gradient(120deg, #edffd5 0%, #f5ffe7 48%, #eaffc8 100%);
        box-shadow: var(--shadow-md);
      }

      .eyebrow {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 15px;
        font-size: 16px;
        font-weight: 900;
        line-height: 1.2;
      }

      .goal-card h3 {
        margin: 0 0 11px;
        font-size: 29px;
        line-height: 1.08;
        font-weight: 950;
        text-wrap: balance;
      }

      .quote {
        margin: 0 0 15px;
        color: #7c8286;
        font-size: 14px;
        font-weight: 650;
        line-height: 1.35;
        text-wrap: pretty;
      }

      .meta-line {
        display: flex;
        align-items: center;
        gap: 14px;
        color: #7c8286;
        font-size: 13px;
        font-weight: 650;
        line-height: 1.2;
        white-space: nowrap;
      }

      .pill {
        min-width: 48px;
        padding: 5px 10px;
        border-radius: 999px;
        color: #5da600;
        background: rgba(154, 221, 16, 0.2);
        font-weight: 850;
      }

      .progress-ring {
        align-self: center;
        justify-self: center;
        width: 116px;
        height: 116px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: conic-gradient(var(--lime) calc(var(--value) * 1%), #fff calc(var(--value) * 1%) 100%);
        box-shadow: inset 0 0 0 16px rgba(255, 255, 255, 0.78);
      }

      .progress-ring::before {
        content: "";
        position: absolute;
        width: 82px;
        height: 82px;
        border-radius: 50%;
        background: #f8ffe9;
      }

      .ring-copy {
        position: relative;
        z-index: var(--z-base);
        text-align: center;
      }

      .ring-number {
        display: block;
        font-size: 34px;
        font-weight: 950;
        line-height: 1;
      }

      .ring-number small {
        font-size: 15px;
      }

      .ring-label {
        display: block;
        margin-top: 5px;
        color: #70777c;
        font-size: 13px;
        font-weight: 750;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 18px;
      }

      .stat-card {
        display: block;
        min-width: 0;
        min-height: 124px;
        padding: 15px 8px 14px;
        border-radius: 17px;
        text-align: left;
        background: var(--panel);
        box-shadow: var(--shadow-md);
      }

      .stat-top {
        display: flex;
        align-items: center;
        gap: 4px;
        color: #4d565d;
        font-size: 12px;
        font-weight: 800;
        line-height: 1.15;
        white-space: nowrap;
      }

      .badge {
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        width: 19px;
        height: 19px;
        border-radius: 999px;
        color: #fff;
      }

      .badge .hugeicon {
        width: 14px;
        height: 14px;
      }

      .badge.blue { background: var(--blue); }
      .badge.orange { background: var(--orange); }
      .badge.green { background: var(--lime-deep); }

      .stat-value {
        margin: 23px 0 9px;
        font-size: 31px;
        line-height: 1;
        font-weight: 950;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }

      .stat-value small {
        margin-left: 2px;
        font-size: 13px;
        font-weight: 750;
      }

      .stat-note {
        color: #8a8e93;
        font-size: 12px;
        font-weight: 650;
        line-height: 1.2;
        white-space: nowrap;
      }

      .meter {
        height: 5px;
        margin-top: 12px;
        overflow: hidden;
        border-radius: 99px;
        background: #edf0f1;
      }

      .meter span {
        display: block;
        width: var(--meter);
        height: 100%;
        border-radius: inherit;
        background: var(--meter-color);
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 27px 0 14px;
      }

      .section-title h3 {
        margin: 0;
        font-size: 21px;
        font-weight: 950;
        line-height: 1.18;
        text-wrap: balance;
      }

      .link-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: #8a8e93;
        font-size: 14px;
        font-weight: 650;
        line-height: 1.2;
        white-space: nowrap;
      }

      .plan-list {
        overflow: hidden;
        border-radius: 18px;
        background: var(--panel);
        box-shadow: var(--shadow-md);
      }

      .plan-row {
        display: grid;
        grid-template-columns: 29px 56px minmax(0, 1fr) 42px;
        align-items: center;
        width: 100%;
        min-height: 64px;
        padding: 9px 13px;
        text-align: left;
      }

      .plan-row + .plan-row {
        border-top: 1px solid var(--line);
      }

      .plan-index {
        color: #292f34;
        font-size: 15px;
        font-weight: 700;
        line-height: 1;
      }

      .task-icon {
        display: grid;
        place-items: center;
        width: 39px;
        height: 39px;
        border-radius: 999px;
        color: var(--icon-color);
        background: var(--icon-bg);
      }

      .plan-copy strong {
        display: block;
        margin-bottom: 4px;
        overflow: hidden;
        font-size: 16px;
        line-height: 1.22;
        font-weight: 950;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .plan-copy span {
        color: #7f858a;
        font-size: 13px;
        font-weight: 650;
        line-height: 1.2;
        font-variant-numeric: tabular-nums;
      }

      .check {
        justify-self: end;
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border: 2px solid #e2e3e5;
        border-radius: 999px;
        color: transparent;
        background: #fff;
      }

      .plan-row.is-done .check {
        border-color: transparent;
        color: var(--lime-deep);
        background: rgba(154, 221, 16, 0.15);
      }

      .start-card {
        position: relative;
        z-index: var(--z-base);
        display: grid;
        grid-template-columns: 70px 1fr 96px;
        align-items: center;
        width: 100%;
        min-height: 66px;
        margin-top: 27px;
        overflow: hidden;
        border-radius: 34px;
        background: linear-gradient(100deg, #c9f35b 0%, #b8ee3a 45%, #dcff8a 100%);
        box-shadow: 0 14px 28px rgba(118, 191, 0, 0.24);
      }

      .start-card::after {
        content: "";
        position: absolute;
        inset: 2px;
        border-radius: 32px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        pointer-events: none;
      }

      .start-knob {
        position: relative;
        z-index: var(--z-base);
        display: grid;
        place-items: center;
        width: 60px;
        height: 60px;
        margin-left: 3px;
        border: 4px solid rgba(154, 221, 16, 0.72);
        border-radius: 999px;
        background: #fff;
      }

      .start-text {
        position: relative;
        z-index: var(--z-base);
        font-size: 22px;
        font-weight: 950;
        line-height: 1.15;
        padding-right: 12px;
        text-align: center;
      }

      .start-mascot {
        position: absolute;
        right: -8px;
        bottom: -42px;
        width: 126px;
        pointer-events: none;
      }

      .bottom-nav {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: var(--z-nav);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        height: calc(92px + env(safe-area-inset-bottom));
        padding: 12px 30px calc(23px + env(safe-area-inset-bottom));
        background: rgba(255, 255, 255, 0.93);
        box-shadow: 0 -15px 30px rgba(35, 44, 56, 0.08);
      }

      .nav-item {
        display: grid;
        justify-items: center;
        align-content: center;
        gap: 4px;
        min-width: 0;
        color: #6e7478;
        font-size: 13px;
        font-weight: 750;
        line-height: 1.15;
        white-space: nowrap;
      }

      .nav-item svg {
        width: 28px;
        height: 28px;
      }

      .nav-item.is-active {
        color: #050505;
      }

      .nav-focus {
        width: 50px;
        height: 50px;
        margin-top: -18px;
        border-radius: 999px;
        color: #111;
        background: var(--lime);
        box-shadow: 0 8px 18px rgba(127, 200, 0, 0.36);
      }

      .home-indicator {
        position: absolute;
        left: 50%;
        bottom: 10px;
        z-index: var(--z-toast);
        width: 138px;
        height: 5px;
        border-radius: 999px;
        background: #050505;
        transform: translateX(-50%);
      }

      .toast {
        position: absolute;
        left: 50%;
        bottom: 112px;
        z-index: var(--z-toast);
        max-width: 310px;
        padding: 10px 14px;
        border-radius: 999px;
        color: #fff;
        background: rgba(12, 16, 20, 0.88);
        box-shadow: var(--shadow-md);
        font-size: 13px;
        font-weight: 750;
        text-align: center;
        opacity: 0;
        transform: translate(-50%, 10px);
        pointer-events: none;
        transition: opacity 160ms ease-out, transform 160ms ease-out;
      }

      .toast.is-visible {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      @media (max-width: 520px) {
        body {
          display: block;
          padding: 0;
          background: #fff;
        }

        .phone-shell {
          width: 100vw;
          height: 100dvh;
          min-height: 860px;
          padding: 0;
          border-radius: 0;
          box-shadow: none;
        }

        .phone {
          border-radius: 0;
        }

        .phone::after {
          display: none;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="phone-shell">
      <div class="phone">
        <div class="status-bar" aria-label="状态栏">
          <span>9:41</span>
          <span class="system-icons" aria-hidden="true">
            <span class="signal"><i></i><i></i><i></i><i></i></span>
            <span class="wifi"></span>
            <span class="battery"><i></i></span>
          </span>
        </div>

        <main class="page">
          <header class="brand-row">
            <div class="brand-lockup">
              <span class="avatar"><img src="public/assets/focus-bird/mascot-wand.png" alt="" /></span>
              <h1 class="brand">不鸽目标<span class="spark" aria-hidden="true"></span></h1>
            </div>
            <button class="icon-btn tap" type="button" aria-label="查看通知" data-toast="今天有 2 条专注提醒">
              <svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8.5a6 6 0 0 0-12 0c0 7-2.5 7-2.5 8.5h17C20.5 15.5 18 15.5 18 8.5Z"/><path d="M9.5 20a2.8 2.8 0 0 0 5 0"/></svg>
              <span class="dot" aria-hidden="true"></span>
            </button>
          </header>

          <section class="hero">
            <span class="halo" aria-hidden="true"></span>
            <img class="hero-mascot" src="public/assets/focus-bird/mascot-wand.png" alt="不鸽目标吉祥物，手持星星魔杖" />
            <h2>Hi，不鸽同学 👋</h2>
            <p>专注当下，目标自远方来。<span class="spark" aria-hidden="true"></span></p>
          </section>

          <button class="goal-card tap" type="button" aria-label="查看今日专注目标" data-toast="今日目标：作品集改版，截止 18:00">
            <div>
              <div class="eyebrow">
                <svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v3M12 18v3M21 12h-3M6 12H3"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                今日专注目标
              </div>
              <h3>作品集改版<span class="spark" aria-hidden="true"></span></h3>
              <p class="quote">“ 每一步都更靠近理想的自己。 ”</p>
              <div class="meta-line"><span class="pill">设计类</span><span>截止时间 18:00</span></div>
            </div>
            <span class="progress-ring" style="--value: 68" aria-label="目标进度 68%">
              <span class="ring-copy"><span class="ring-number">68<small>%</small></span><span class="ring-label">目标进度</span></span>
            </span>
          </button>

          <section class="stats-grid" aria-label="今日统计">
            <button class="stat-card tap" type="button" data-toast="今日已专注 2.6 小时">
              <span class="stat-top"><span class="badge blue"><svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"/><path d="M12 8v5l3 1.5"/></svg></span>今日专注时长</span>
              <span class="stat-value">2.6<small>小时</small></span>
              <span class="stat-note">目标 4.0 小时</span>
              <span class="meter" style="--meter: 70%; --meter-color: var(--blue)"><span></span></span>
            </button>
            <button class="stat-card tap" type="button" data-toast="已完成 5 / 8 项任务">
              <span class="stat-top"><span class="badge orange"><svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 12 4 4 8-8"/></svg></span>已完成任务</span>
              <span class="stat-value">5<small>/ 8 项</small></span>
              <span class="stat-note">完成度 62%</span>
              <span class="meter" style="--meter: 62%; --meter-color: var(--orange)"><span></span></span>
            </button>
            <button class="stat-card tap" type="button" data-toast="连续专注 12 天，最佳 28 天">
              <span class="stat-top"><span class="badge green"><svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21c4 0 7-2.9 7-7.1 0-3.7-2.7-6.5-5.2-9.9-.5 3.1-2 4.4-4.2 6.1-.9.7-1.6 1.9-1.6 3.3 0 4.4 4 4.6 4 4.6s-1.4-1.5-.2-3.7c.9 2 3.2 2.6 3.2 2.6"/></svg></span>连续专注天数</span>
              <span class="stat-value">12<small>天</small></span>
              <span class="stat-note">最佳 28 天</span>
              <span class="meter" style="--meter: 56%; --meter-color: var(--lime-deep)"><span></span></span>
            </button>
          </section>

          <div class="section-title">
            <h3>今日计划<span class="spark" aria-hidden="true"></span></h3>
            <button class="link-btn tap" type="button" data-toast="已展开全部计划">查看全部 <svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg></button>
          </div>

          <section class="plan-list" aria-label="今日计划列表">
            <button class="plan-row tap is-done" type="button" data-task="作品集首页视觉优化">
              <span class="plan-index">1</span>
              <span class="task-icon" style="--icon-color: var(--lime-deep); --icon-bg: rgba(154, 221, 16, 0.16)"><svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v3M12 18v3M21 12h-3M6 12H3"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/><path d="m16.5 7.5 2-2"/></svg></span>
              <span class="plan-copy"><strong>作品集首页视觉优化</strong><span>10:00 - 11:30</span></span>
              <span class="check"><svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 12 4 4 8-8"/></svg></span>
            </button>
            <button class="plan-row tap" type="button" data-task="作品集交互体验调整">
              <span class="plan-index">2</span>
              <span class="task-icon" style="--icon-color: var(--orange); --icon-bg: rgba(255, 125, 18, 0.14)"><svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="5" width="14" height="11" rx="2"/><path d="M9 20h6M12 16v4"/></svg></span>
              <span class="plan-copy"><strong>作品集交互体验调整</strong><span>14:00 - 15:30</span></span>
              <span class="check"><svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 12 4 4 8-8"/></svg></span>
            </button>
            <button class="plan-row tap" type="button" data-task="案例详情页内容整理">
              <span class="plan-index">3</span>
              <span class="task-icon" style="--icon-color: var(--blue); --icon-bg: rgba(50, 170, 242, 0.14)"><svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v5h4M10 13h5M10 17h4"/></svg></span>
              <span class="plan-copy"><strong>案例详情页内容整理</strong><span>16:00 - 17:00</span></span>
              <span class="check"><svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 12 4 4 8-8"/></svg></span>
            </button>
          </section>

          <button class="start-card tap" type="button" id="startFocus" aria-label="开始专注">
            <span class="start-knob"><svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><path d="m8 5 7 7-7 7"/><path d="m14 5 7 7-7 7"/></svg></span>
            <span class="start-text">开始专注</span>
            <img class="start-mascot" src="public/assets/focus-bird/mascot-wand.png" alt="" />
          </button>
        </main>

        <nav class="bottom-nav" aria-label="底部导航">
          <button class="nav-item tap is-active" type="button" data-nav="首页">
            <svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1Z"/></svg>
            首页
          </button>
          <button class="nav-item tap" type="button" data-nav="目标">
            <svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><path d="m17 7 3-3M20 4v4M20 4h-4"/></svg>
            目标
          </button>
          <button class="nav-item tap" type="button" data-nav="专注">
            <span class="nav-focus"><svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 4H5a1 1 0 0 0-1 1v4M15 4h4a1 1 0 0 1 1 1v4M9 20H5a1 1 0 0 1-1-1v-4M15 20h4a1 1 0 0 0 1-1v-4"/></svg></span>
            专注
          </button>
          <button class="nav-item tap" type="button" data-nav="我的">
            <svg class="hugeicon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.3-4 4-6 8-6s6.7 2 8 6"/></svg>
            我的
          </button>
        </nav>
        <div class="home-indicator" aria-hidden="true"></div>
        <div class="toast" id="toast" role="status" aria-live="polite"></div>
      </div>
    </div>

    <script>
      const toast = document.querySelector("#toast");
      let toastTimer;

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("is-visible");
        window.clearTimeout(toastTimer);
        toastTimer = window.setTimeout(() => toast.classList.remove("is-visible"), 1500);
      }

      document.querySelectorAll(".tap").forEach((control) => {
        control.addEventListener("pointerdown", () => {
          if (control.disabled || control.getAttribute("aria-disabled") === "true") return;
          control.classList.add("is-pressed");
          window.setTimeout(() => control.classList.remove("is-pressed"), 150);
        });
      });

      document.querySelectorAll("[data-toast]").forEach((control) => {
        control.addEventListener("click", () => showToast(control.dataset.toast));
      });

      document.querySelectorAll(".plan-row").forEach((row) => {
        row.addEventListener("click", () => {
          const done = row.classList.toggle("is-done");
          row.setAttribute("aria-pressed", done ? "true" : "false");
          showToast(done ? `已完成：${row.dataset.task}` : `已恢复：${row.dataset.task}`);
        });
      });

      document.querySelectorAll(".nav-item").forEach((item) => {
        item.addEventListener("click", () => {
          document.querySelectorAll(".nav-item").forEach((nav) => nav.classList.remove("is-active"));
          item.classList.add("is-active");
          showToast(`切换到${item.dataset.nav}`);
        });
      });

      document.querySelector("#startFocus").addEventListener("click", (event) => {
        const button = event.currentTarget;
        button.querySelector(".start-text").textContent = "专注已开启";
        button.disabled = true;
        showToast("专注模式已开启，按钮进入禁用态");
      });
    </script>
  </body>
</html>

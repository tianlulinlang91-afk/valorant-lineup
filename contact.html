<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>联系 - Lin Studio</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">Lin Studio</a>
      <nav class="nav">
        <a href="/about.html">关于我</a>
        <a href="/works.html">作品</a>
        <a class="active" href="/contact.html">联系</a>
      </nav>
    </header>
    <main>
      <section class="contact-page">
        <div>
          <p class="eyebrow">Contact</p>
          <h1>让我们把下一个产品界面，做得更清楚也更漂亮。</h1>
        </div>
        <form class="contact-form">
          <label>
            姓名
            <input type="text" name="name" placeholder="你的名字" />
          </label>
          <label>
            邮箱
            <input type="email" name="email" placeholder="name@example.com" />
          </label>
          <label>
            项目需求
            <textarea name="message" rows="6" placeholder="简单说说产品类型、当前阶段和期望时间"></textarea>
          </label>
          <a class="button primary" href="mailto:hello@lin-studio.design">发送邮件</a>
        </form>
      </section>
    </main>
  </body>
</html>

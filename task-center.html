<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>任务中心</title>
  <style>
    :root {
      --ink: #171c2b;
      --soft-ink: #687987;
      --cyan: #65e8ee;
      --cyan-deep: #28aeea;
      --cyan-text: #35bdd1;
      --blue: #2ba8ef;
      --gold: #ffc447;
      --orange: #ff9912;
      --vip: #37241f;
      --line: rgba(83, 194, 205, 0.38);
      --glass: rgba(238, 254, 255, 0.72);
      --shadow: 0 16px 38px rgba(39, 170, 210, 0.2);
      --ease: cubic-bezier(.2, .8, .2, 1);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #e8fbff;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    button {
      border: 0;
      padding: 0;
      color: inherit;
      font: inherit;
      background: transparent;
      cursor: pointer;
    }

    .screen {
      position: relative;
      width: min(100vw, 375px);
      min-height: 812px;
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(circle at 83% 21%, rgba(255, 255, 255, .95) 0 39px, transparent 77px),
        radial-gradient(circle at 87% 43%, rgba(41, 176, 235, .25), transparent 118px),
        radial-gradient(circle at 4% 78%, rgba(255, 247, 211, .9), transparent 132px),
        linear-gradient(180deg, #aeeaf6 0, #d9f8ff 220px, #f8ffff 100%);
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .05), rgba(255, 255, 255, .46) 72%),
        radial-gradient(circle at 57% 58%, rgba(84, 231, 239, .16), transparent 132px);
    }

    .touchable {
      position: relative;
      transition:
        transform .18s var(--ease),
        filter .18s var(--ease),
        opacity .18s var(--ease),
        box-shadow .18s var(--ease),
        background .18s var(--ease);
    }

    .touchable:hover {
      filter: brightness(1.03) saturate(1.03);
      transform: translateY(-1px);
    }

    .touchable:active,
    .touchable.is-pressed {
      filter: brightness(.96);
      transform: translateY(1px) scale(.98);
    }

    .touchable:focus-visible {
      outline: 3px solid rgba(37, 171, 239, .34);
      outline-offset: 3px;
    }

    .touchable:disabled,
    .touchable.is-disabled {
      cursor: default;
      filter: grayscale(.22);
      opacity: .62;
      transform: none;
      box-shadow: none;
    }

    .status-bar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      padding: 11px 31px 0 33px;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -.2px;
    }

    .system-icons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .signal-bars {
      display: grid;
      grid-template-columns: repeat(4, 4px);
      align-items: end;
      gap: 2px;
      height: 14px;
    }

    .signal-bars span {
      display: block;
      width: 4px;
      border-radius: 4px;
      background: #05070a;
    }

    .signal-bars span:nth-child(1) { height: 6px; }
    .signal-bars span:nth-child(2) { height: 9px; }
    .signal-bars span:nth-child(3) { height: 12px; }
    .signal-bars span:nth-child(4) { height: 15px; }

    .wifi {
      position: relative;
      width: 19px;
      height: 14px;
      overflow: hidden;
    }

    .wifi::before,
    .wifi::after {
      content: "";
      position: absolute;
      left: 50%;
      border: 3px solid #05070a;
      border-bottom: 0;
      transform: translateX(-50%);
    }

    .wifi::before {
      top: 0;
      width: 25px;
      height: 17px;
      border-radius: 25px 25px 0 0;
    }

    .wifi::after {
      top: 7px;
      width: 12px;
      height: 8px;
      border-radius: 13px 13px 0 0;
    }

    .battery {
      position: relative;
      width: 24px;
      height: 12px;
      border: 2px solid #05070a;
      border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(255,255,255,.55);
    }

    .battery::before {
      content: "";
      position: absolute;
      right: -5px;
      top: 3px;
      width: 3px;
      height: 5px;
      border-radius: 0 3px 3px 0;
      background: #05070a;
    }

    .battery::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: 2px;
      background: #05070a;
    }

    main {
      position: relative;
      z-index: 1;
      padding: 8px 12px 92px;
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 19px;
    }

    .title {
      margin: 0;
      color: var(--ink);
      font-size: 32px;
      font-style: italic;
      font-weight: 1000;
      line-height: .95;
      letter-spacing: -1.5px;
      text-shadow: 0 2px 0 rgba(255,255,255,.28);
    }

    .top-actions {
      display: flex;
      gap: 14px;
      margin-top: -9px;
    }

    .round-btn {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      color: #292d34;
      background: rgba(255,255,255,.34);
      box-shadow:
        inset 0 2px 7px rgba(255,255,255,.62),
        0 7px 14px rgba(94, 193, 220, .11);
    }

    .round-btn svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.5;
    }

    .profile {
      display: grid;
      grid-template-columns: 58px 1fr 86px;
      align-items: center;
      column-gap: 10px;
      margin-bottom: 10px;
    }

    .avatar {
      position: relative;
      width: 56px;
      height: 56px;
      border: 3px solid rgba(255,255,255,.74);
      border-radius: 50%;
      overflow: hidden;
      background:
        linear-gradient(120deg, rgba(255,255,255,.5) 0 13%, transparent 13% 22%, rgba(255,255,255,.36) 22% 32%, transparent 32%),
        radial-gradient(circle at 49% 35%, #f5bf94 0 11px, transparent 12px),
        radial-gradient(circle at 48% 26%, #24261f 0 15px, transparent 16px),
        linear-gradient(135deg, #cedfd6, #68755f);
      box-shadow: 0 9px 18px rgba(50, 132, 156, .2);
    }

    .avatar::before {
      content: "";
      position: absolute;
      left: 13px;
      top: 31px;
      width: 30px;
      height: 14px;
      border-radius: 4px 4px 12px 12px;
      background: #f05c3a;
      box-shadow: 0 -3px 0 rgba(255,255,255,.86);
      transform: rotate(-3deg);
    }

    .profile-main {
      min-width: 0;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 11px;
      font-size: 20px;
      font-weight: 950;
      letter-spacing: -.4px;
    }

    .vip-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 46px;
      height: 21px;
      padding: 0 7px;
      border-radius: 999px;
      color: #ffe2bf;
      background: linear-gradient(140deg, #4b2e25, #211b1b 68%);
      font-size: 13px;
      font-style: italic;
      font-weight: 1000;
      line-height: 1;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
    }

    .growth-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .diamond {
      width: 23px;
      height: 19px;
      clip-path: polygon(13% 0, 86% 0, 100% 31%, 50% 100%, 0 31%);
      background:
        linear-gradient(135deg, transparent 0 37%, rgba(255,246,165,.9) 38% 56%, transparent 57%),
        linear-gradient(135deg, #33281d, #735d39 42%, #2f2822);
      filter: drop-shadow(0 2px 0 rgba(0,0,0,.14));
    }

    .growth-track {
      position: relative;
      width: 136px;
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.68);
    }

    .growth-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 48.876%;
      border-radius: inherit;
      background: #26aeee;
      box-shadow: 0 0 8px rgba(38, 174, 238, .22);
      transition: width .35s var(--ease);
    }

    .growth-text {
      color: var(--cyan-text);
      font-size: 13px;
      font-weight: 850;
      white-space: nowrap;
    }

    .sign-btn {
      justify-self: end;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 86px;
      height: 31px;
      border: 1px solid rgba(82, 136, 159, .2);
      border-radius: 10px;
      color: #303844;
      background: rgba(241, 253, 255, .58);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.56),
        0 5px 12px rgba(87, 165, 192, .08);
      font-size: 14px;
      font-weight: 850;
    }

    .sign-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.4;
    }

    .svip-strip {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 228px;
      height: 35px;
      margin: -1px auto 8px;
      border: 1px solid rgba(63, 200, 214, .42);
      border-radius: 10px;
      color: #2bbbd1;
      background: rgba(225, 255, 255, .68);
      box-shadow: inset 0 0 18px rgba(255,255,255,.58);
      font-size: 15px;
      font-weight: 850;
      white-space: nowrap;
    }

    .svip-strip::after {
      content: "";
      width: 9px;
      height: 9px;
      margin-left: 8px;
      border-top: 3px solid currentColor;
      border-right: 3px solid currentColor;
      border-radius: 2px;
      transform: rotate(45deg);
    }

    .mascot {
      position: absolute;
      z-index: 2;
      right: 27px;
      top: 174px;
      width: 68px;
      height: 60px;
      border-radius: 48% 48% 46% 46%;
      background:
        radial-gradient(circle at 42% 52%, #4f2030 0 3px, transparent 4px),
        radial-gradient(circle at 61% 52%, #4f2030 0 3px, transparent 4px),
        radial-gradient(circle at 51% 65%, #eb6d75 0 7px, transparent 8px),
        linear-gradient(180deg, #fff 0, #e4f8ff 74%);
      filter: drop-shadow(0 12px 14px rgba(88, 132, 187, .16));
      pointer-events: none;
    }

    .mascot::before {
      content: "";
      position: absolute;
      left: -7px;
      right: -7px;
      top: -13px;
      height: 34px;
      border-radius: 50%;
      border-top: 12px solid rgba(241, 238, 255, .95);
      transform: rotate(10deg);
    }

    .mascot::after {
      content: "";
      position: absolute;
      left: 13px;
      bottom: -18px;
      width: 44px;
      height: 26px;
      border-radius: 20px 20px 9px 9px;
      background: linear-gradient(180deg, rgba(244,252,255,.85), rgba(218,246,255,.78));
    }

    .section-title {
      position: relative;
      z-index: 2;
      display: inline-block;
      margin: 0;
      color: var(--ink);
      font-size: 28px;
      font-style: italic;
      font-weight: 1000;
      line-height: .98;
      letter-spacing: -1px;
      text-shadow: 0 2px 0 rgba(255,255,255,.28);
    }

    .section-title::after {
      content: "";
      position: absolute;
      z-index: -1;
      left: -6px;
      right: 2px;
      bottom: -4px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffd866, rgba(255, 217, 102, .2) 72%, transparent);
    }

    .points-card {
      position: relative;
      z-index: 1;
      margin-top: 8px;
      margin-bottom: 28px;
      padding: 18px 24px 10px;
      border: 1px solid rgba(75, 195, 205, .4);
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(224, 253, 255, .9), rgba(250, 255, 255, .94)),
        radial-gradient(circle at 11% 4%, rgba(255,255,255,.75), transparent 120px);
      box-shadow: var(--shadow);
    }

    .points-card::before {
      content: "";
      position: absolute;
      right: 0;
      top: 13px;
      width: 178px;
      height: 58px;
      border-top-right-radius: 21px;
      background: linear-gradient(145deg, #28a8eb 0, #45d8f1 100%);
      clip-path: polygon(23% 0, 100% 0, 100% 100%, 0 42%);
    }

    .points-card::after {
      content: "";
      position: absolute;
      left: 5px;
      right: 5px;
      bottom: 4px;
      height: 22px;
      border-radius: 999px;
      background: rgba(77, 202, 219, .08);
      filter: blur(8px);
      pointer-events: none;
    }

    .exchange {
      position: absolute;
      z-index: 3;
      right: 14px;
      top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 29px;
      padding: 0 6px 0 8px;
      border-radius: 999px;
      color: #fff;
      font-size: 15px;
      font-weight: 950;
      letter-spacing: -.3px;
    }

    .exchange::after {
      content: "";
      width: 8px;
      height: 8px;
      border-top: 3px solid currentColor;
      border-right: 3px solid currentColor;
      border-radius: 2px;
      transform: rotate(45deg);
    }

    .coin {
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      border-radius: 50%;
      color: #d88f00;
      background:
        radial-gradient(circle at 34% 29%, #fffbd0, transparent 35%),
        linear-gradient(135deg, #fff082, #ffb11b);
      box-shadow:
        inset 0 0 0 1px rgba(198, 123, 0, .18),
        0 2px 4px rgba(224, 150, 0, .22);
      font-size: 11px;
      font-weight: 1000;
    }

    .points-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      min-height: 31px;
    }

    .points-summary {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: max-content 1fr;
      align-items: center;
      gap: 4px;
      margin: 5px 0 14px;
      color: #647683;
      font-size: 14px;
    }

    .current-score {
      display: inline-flex;
      align-items: center;
      color: #1f2731;
      white-space: nowrap;
      font-size: 17px;
      font-weight: 650;
    }

    .star {
      width: 28px;
      height: 28px;
      margin-left: 8px;
      margin-right: 5px;
      background:
        radial-gradient(circle at 33% 30%, #fff7a6, transparent 27%),
        linear-gradient(135deg, #ffe765, #ff9810);
      clip-path: polygon(50% 0, 62% 35%, 100% 35%, 69% 57%, 80% 94%, 50% 72%, 20% 94%, 31% 57%, 0 35%, 38% 35%);
      filter: drop-shadow(0 3px 3px rgba(255, 143, 0, .3));
    }

    .score {
      color: var(--orange);
      font-size: 31px;
      font-weight: 1000;
      letter-spacing: -.6px;
    }

    .round-remain {
      text-align: right;
      font-size: 14px;
      letter-spacing: -.6px;
      line-height: 1.28;
      white-space: nowrap;
    }

    .reward-board {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 72px 1fr;
      overflow: hidden;
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(103, 231, 237, .76), rgba(236, 255, 255, .9) 48%, rgba(255, 246, 223, .72)),
        linear-gradient(180deg, rgba(255,255,255,.54), rgba(255,255,255,.15));
    }

    .reward-labels {
      display: grid;
      grid-template-rows: 70px 70px;
      color: #151c29;
      font-size: 16px;
      font-weight: 1000;
      line-height: 1.15;
      text-align: center;
    }

    .reward-labels > div {
      display: grid;
      place-items: center;
      padding: 8px;
      background: rgba(104, 232, 237, .52);
    }

    .reward-labels > div:last-child {
      color: #71472b;
      background: linear-gradient(180deg, #fff0cd, #ffe9df);
    }

    .reward-labels .vip-badge {
      transform: scale(.74);
      transform-origin: center;
      margin-bottom: -5px;
    }

    .reward-scroll {
      position: relative;
      overflow-x: auto;
      scrollbar-width: none;
      scroll-snap-type: x proximity;
      cursor: grab;
    }

    .reward-scroll::-webkit-scrollbar {
      display: none;
    }

    .reward-scroll:active {
      cursor: grabbing;
    }

    .reward-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 68px;
      height: 3px;
      background: linear-gradient(90deg, #27b5ee 0 34%, #d9d0cc 34% 100%);
    }

    .reward-grid {
      position: relative;
      display: grid;
      grid-template-columns: repeat(6, 92px);
      grid-template-rows: 57px 24px 57px;
      align-items: center;
      width: max-content;
      min-height: 138px;
      padding: 6px 12px;
    }

    .reward {
      display: grid;
      place-items: center;
      gap: 5px;
      width: 82px;
      min-height: 50px;
      margin: auto;
      border-radius: 10px;
      color: #7c8d99;
      background: rgba(255,255,255,.73);
      box-shadow: inset 0 0 16px rgba(255,255,255,.42);
      scroll-snap-align: start;
      font-size: 13px;
      font-weight: 650;
      white-space: nowrap;
    }

    .reward.is-disabled {
      opacity: .72;
      filter: grayscale(.08);
    }

    .reward-icon {
      position: relative;
      display: grid;
      place-items: center;
      width: 31px;
      height: 26px;
      border-radius: 7px;
      color: #fff;
      background: linear-gradient(180deg, #d1f4ff, #86d5ee);
      box-shadow: inset 0 3px 0 rgba(255,255,255,.32);
      font-size: 18px;
      font-weight: 1000;
    }

    .reward-icon.disk::before {
      content: "";
      width: 17px;
      height: 6px;
      border-radius: 2px;
      background: rgba(255,255,255,.78);
    }

    .reward-icon.ticket::before {
      content: "%";
      font-size: 20px;
    }

    .reward-icon.card {
      width: 47px;
      height: 27px;
      border-radius: 7px;
      color: #fff0c9;
      background:
        radial-gradient(circle at 10% 0, rgba(255,255,255,.5), transparent 26px),
        linear-gradient(135deg, #181d24, #706e68);
      font-size: 11px;
      font-style: italic;
    }

    .reward-icon.card::before {
      content: "SVIP年卡";
    }

    .reward.vip-row {
      background: linear-gradient(180deg, rgba(255, 244, 229, .8), rgba(255, 237, 234, .78));
    }

    .reward.vip-row .reward-icon.disk {
      background: linear-gradient(180deg, #ffd4c1, #ff977c);
    }

    .milestone {
      position: relative;
      justify-self: center;
      z-index: 2;
      display: grid;
      place-items: center;
      min-width: 50px;
      height: 22px;
      padding: 0 10px;
      border-radius: 999px;
      color: #31b5d5;
      background: rgba(255,255,255,.95);
      font-size: 13px;
      font-weight: 950;
      box-shadow: 0 3px 6px rgba(57, 173, 204, .12);
    }

    .milestone.locked {
      color: #fff;
      background: #c9c4c1;
    }

    .milestone.vip {
      color: #fff;
      background: linear-gradient(180deg, #ffd077, #f8a23d);
    }

    .tasks-title {
      margin-left: 34px;
      margin-bottom: 18px;
      font-size: 30px;
    }

    .tasks-card {
      position: relative;
      min-height: 484px;
      margin-left: 12px;
      margin-right: -12px;
      padding: 55px 23px 28px 24px;
      border-radius: 0 25px 0 0;
      background:
        radial-gradient(circle at 14% 0, rgba(255,255,255,.95), transparent 92px),
        linear-gradient(100deg, rgba(255, 255, 248, .96) 0, rgba(235, 255, 255, .92) 39%, rgba(120, 232, 241, .63) 100%);
      box-shadow: 0 -2px 28px rgba(48, 180, 216, .16);
    }

    .tasks-card::before {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 236px;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(99, 224, 235, .34));
      pointer-events: none;
    }

    .task-banner {
      position: absolute;
      left: 31px;
      top: -24px;
      display: flex;
      align-items: center;
      gap: 9px;
      width: 244px;
      min-height: 72px;
      padding: 12px 18px 12px 25px;
      border-radius: 0 23px 23px 0;
      color: #101827;
      background:
        radial-gradient(circle at 72% 48%, rgba(255,255,255,.9), transparent 42px),
        linear-gradient(90deg, rgba(255,255,255,.92), rgba(75,225,234,.66));
      box-shadow: 0 16px 27px rgba(54, 180, 212, .18);
      font-size: 22px;
      font-weight: 1000;
      line-height: 1.14;
    }

    .task-banner svg {
      flex: 0 0 auto;
      width: 25px;
      height: 25px;
    }

    .task-timer {
      position: absolute;
      right: 20px;
      top: 28px;
      color: #657783;
      font-size: 14px;
      font-weight: 750;
      white-space: nowrap;
    }

    .task-list {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 24px;
    }

    .task {
      display: grid;
      grid-template-columns: 60px minmax(0, 1fr) 96px;
      align-items: center;
      gap: 12px;
    }

    .task-icon {
      display: grid;
      place-items: center;
      width: 56px;
      height: 56px;
      border: 1px solid rgba(91, 113, 130, .12);
      border-radius: 50%;
      background: rgba(255,255,255,.8);
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,.62),
        0 6px 12px rgba(83, 140, 163, .08);
    }

    .task-art {
      position: relative;
      width: 34px;
      height: 31px;
      border-radius: 8px;
      background: linear-gradient(180deg, #d7ff8c, #54c953);
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,.5),
        0 3px 6px rgba(94, 173, 72, .2);
    }

    .task-art.ads::before {
      content: "ADS";
      position: absolute;
      left: 4px;
      top: 8px;
      color: #fff;
      font-size: 11px;
      font-weight: 1000;
      letter-spacing: -.2px;
      text-shadow: 0 1px 1px rgba(60, 123, 42, .35);
    }

    .task-art.ads::after {
      content: "";
      position: absolute;
      right: -8px;
      bottom: -8px;
      width: 13px;
      height: 13px;
      background: #33413c;
      clip-path: polygon(0 0, 100% 48%, 55% 56%, 76% 100%, 60% 100%, 39% 60%, 0 88%);
      transform: rotate(-10deg);
    }

    .task-art.shop {
      background: linear-gradient(180deg, #ffe977, #ff7c20);
      border-radius: 8px 8px 10px 10px;
    }

    .task-art.shop::before {
      content: "";
      position: absolute;
      left: 7px;
      right: 7px;
      top: -2px;
      height: 14px;
      border: 5px solid #fff2a0;
      border-bottom: 0;
      border-radius: 11px 11px 0 0;
    }

    .task-art.map {
      width: 38px;
      height: 29px;
      border-radius: 9px;
      background: linear-gradient(135deg, #95ec77, #ffe071);
      transform: rotate(-6deg);
    }

    .task-art.map::before {
      content: "";
      position: absolute;
      left: 14px;
      top: -8px;
      width: 14px;
      height: 20px;
      border-radius: 10px 10px 10px 0;
      background: linear-gradient(180deg, #ff8a5e, #ef583a);
      transform: rotate(45deg);
      box-shadow: 0 2px 4px rgba(233, 88, 54, .24);
    }

    .task-art.map::after {
      content: "";
      position: absolute;
      left: 18px;
      top: -2px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #fff6d7;
    }

    .task-name {
      margin-bottom: 8px;
      overflow: hidden;
      color: #171c2b;
      font-size: 21px;
      font-weight: 1000;
      line-height: 1.08;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: -.45px;
    }

    .task-reward {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--orange);
      font-size: 19px;
      font-weight: 1000;
      white-space: nowrap;
    }

    .mini-star {
      width: 18px;
      height: 18px;
      background:
        radial-gradient(circle at 33% 30%, #fff8a7, transparent 29%),
        linear-gradient(135deg, #ffe86d, #ff970d);
      clip-path: polygon(50% 0, 62% 35%, 100% 35%, 69% 57%, 80% 94%, 50% 72%, 20% 94%, 31% 57%, 0 35%, 38% 35%);
      filter: drop-shadow(0 2px 2px rgba(255, 143, 0, .28));
    }

    .svip-extra {
      display: inline-flex;
      align-items: center;
      height: 23px;
      padding: 0 8px;
      border: 1px solid #d0a55c;
      border-radius: 999px;
      color: #8c651f;
      background: rgba(255,255,255,.78);
      font-size: 13px;
      font-style: italic;
      font-weight: 1000;
      line-height: 1;
    }

    .task-btn {
      justify-self: end;
      width: 92px;
      height: 44px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(180deg, #36aff0, #249ee6);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.22),
        0 8px 15px rgba(24, 148, 224, .28);
      font-size: 17px;
      font-weight: 850;
    }

    .task.is-complete .task-name {
      color: #5f7783;
    }

    .task.is-complete .task-reward {
      color: #a1b1b8;
    }

    .task-btn:disabled {
      color: #fff;
      background: linear-gradient(180deg, #a9c7d5, #95b5c4);
      opacity: .9;
    }

    .bottom-nav {
      position: fixed;
      z-index: 10;
      left: 50%;
      bottom: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      width: min(100vw, 375px);
      height: 88px;
      padding: 9px 13px 21px;
      transform: translateX(-50%);
      background: rgba(249,250,253,.95);
      box-shadow: 0 -12px 25px rgba(92, 118, 136, .09);
      backdrop-filter: blur(10px);
    }

    .nav-item {
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 5px;
      color: #b8bdc4;
      font-size: 13px;
      font-weight: 850;
    }

    .nav-item svg {
      width: 26px;
      height: 26px;
      fill: currentColor;
    }

    .nav-item.is-active {
      color: #2aa7e8;
    }

    .home-indicator {
      position: fixed;
      z-index: 11;
      left: 50%;
      bottom: 8px;
      width: 134px;
      height: 5px;
      border-radius: 999px;
      background: #050506;
      transform: translateX(-50%);
    }

    .toast {
      position: fixed;
      z-index: 20;
      left: 50%;
      bottom: 104px;
      max-width: min(315px, calc(100vw - 32px));
      padding: 10px 14px;
      border-radius: 999px;
      color: #fff;
      background: rgba(24, 37, 48, .9);
      box-shadow: 0 10px 22px rgba(17, 44, 60, .16);
      font-size: 14px;
      font-weight: 800;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, 13px);
      transition: opacity .22s var(--ease), transform .22s var(--ease);
    }

    .toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .shake {
      animation: shake .36s var(--ease);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      55% { transform: translateX(4px); }
      80% { transform: translateX(-2px); }
    }

    @media (max-width: 360px) {
      .profile {
        grid-template-columns: 54px 1fr;
        row-gap: 9px;
      }

      .sign-btn {
        grid-column: 2;
        justify-self: start;
      }

      .points-card {
        padding-inline: 17px;
      }

      .task {
        grid-template-columns: 56px minmax(0, 1fr);
      }

      .task-btn {
        grid-column: 2;
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <div class="screen">

      <section class="profile" aria-label="用户信息">

        <div class="reward-board">

          </div>
          <div class="reward-scroll" aria-label="奖励进度，可横向滚动">
            <div class="reward-line"></div>
            <div class="reward-grid">
              <button class="reward touchable" type="button" data-cost="100" data-name="5GB空间"><span class="reward-icon disk"></span><span>5GB空间</span></button>
              <button class="reward touchable" type="button" data-cost="130" data-name="10GB空间"><span class="reward-icon disk"></span><span>10GB空间</span></button>
              <button class="reward touchable" type="button" data-cost="200" data-name="5分钟下载券"><span class="reward-icon ticket"></span><span>5分钟下载券</span></button>
              <button class="reward touchable" type="button" data-cost="260" data-name="50金币"><span class="reward-icon"><span class="coin">￥</span></span><span>50金币</span></button>
              <button class="reward touchable" type="button" data-cost="6000" data-name="SVIP年卡"><span class="reward-icon card"></span><span>抽SVIP年卡</span></button>
              <button class="reward touchable" type="button" data-cost="7000" data-name="年卡续费"><span class="reward-icon card"></span><span>抽年卡续费</span></button>

              <span class="milestone">100</span>
              <span class="milestone">130</span>
              <span class="milestone locked">200</span>
              <span class="milestone locked">260</span>

              <button class="reward vip-row touchable" type="button" data-cost="100" data-name="SVIP 5GB空间"><span class="reward-icon disk"></span><span>5GB空间</span></button>
              <button class="reward vip-row touchable" type="button" data-cost="130" data-name="SVIP 10GB空间"><span class="reward-icon disk"></span><span>10GB空间</span></button>
              <button class="reward vip-row touchable" type="button" data-cost="200" data-name="100金币"><span class="reward-icon"><span class="coin">￥</span></span><span>100金币</span></button>
              <button class="reward vip-row touchable" type="button" data-cost="260" data-name="200金币"><span class="reward-icon"><span class="coin">￥</span></span><span>200金币</span></button>
              <button class="reward touchable" type="button" data-cost="6000" data-name="SVIP年卡续费"><span class="reward-icon card"></span><span>抽年卡续费</span></button>
              <button class="reward touchable" type="button" data-cost="7000" data-name="SVIP月卡"><span class="reward-icon card"></span><span>抽SVIP月卡</span></button>

          </div>
        </div>
      </section>

      <h2 class="section-title tasks-title">做任务赚积分</h2>
      <section class="tasks-card" aria-label="任务列表">
        <div class="task-banner">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#101827" d="M8 3h8v3l-2 1.35A7 7 0 1 1 7 7.35L8 6V3Zm2 2v1.25l2 1.35l2-1.35V5h-4Zm2 15a5 5 0 1 0 0-10a5 5 0 0 0 0 10Zm1-8v3.08l2.08-2.08l1.42 1.42l-3.9 3.9H11V12h2Z"/></svg>
          完成任务领15GB空间

        <div class="task-timer">倒计时： <span id="taskTimer">14:53:11</span></div>
        <div class="task-list">

            <div class="task-copy">
              <div class="task-name">看30s视频广告</div>
              <div class="task-reward"><span class="mini-star"></span>+26 <span class="svip-extra">SVIP 再+3</span></div>

          </article>
          <article class="task">
            <div class="task-icon"><span class="task-art shop"></span></div>
            <div class="task-copy">
              <div class="task-name">去浏览金币商城</div>
              <div class="task-reward"><span class="mini-star"></span>+32 <span class="svip-extra">SVIP 再+3</span></div>
            </div>
            <button class="task-btn touchable" type="button" data-points="35">去完成</button>
          </article>
          <article class="task">
            <div class="task-icon"><span class="task-art map"></span></div>
            <div class="task-copy">
              <div class="task-name">去浏览金币商城</div>
              <div class="task-reward"><span class="mini-star"></span>+36 <span class="svip-extra">SVIP 再+3</span></div>
            </div>
            <button class="task-btn touchable" type="button" data-points="39">去完成</button>
          </article>
        </div>

    </main>

    <nav class="bottom-nav" aria-label="底部导航">
      <button class="nav-item touchable is-active" type="button" data-nav="首页">
        <svg viewBox="0 0 24 24"><path d="M19 5h-2.25A3 3 0 0 0 14 3h-4a3 3 0 0 0-2.75 2H5a3 3 0 0 0-3 3v9a4 4 0 0 0 4 4h12a4 4 0 0 0 4-4V8a3 3 0 0 0-3-3Zm-9-1h4a2 2 0 0 1 1.73 1H8.27A2 2 0 0 1 10 4Zm5 12H9v-2h6v2Zm3-5H6V9h12v2Z"/></svg>
        首页
      </button>

        会员
      </button>

        <svg viewBox="0 0 24 24"><path d="M5 4h10a4 4 0 0 1 4 4v12H9a4 4 0 0 1-4-4V4Zm4 3v9a2 2 0 0 0 2 2h6V8a2 2 0 0 0-2-2H9Z"/></svg>
        知识
      </button>
      <button class="nav-item touchable" type="button" data-nav="公益">
        <svg viewBox="0 0 24 24"><path d="M12 21S4 16.3 4 9.8A4.8 4.8 0 0 1 12 6a4.8 4.8 0 0 1 8 3.8C20 16.3 12 21 12 21Z"/></svg>
        公益
      </button>
      <button class="nav-item touchable" type="button" data-nav="我的">
        <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0 0-10a5 5 0 0 0 0 10Zm-9 9a9 9 0 0 1 18 0H3Z"/></svg>
        我的
      </button>

    <div class="home-indicator" aria-hidden="true"></div>

  </div>

  <script>
    const state = {
      points: 12,
      growth: 48876,
      signedDays: 2,
      signedToday: false
    };

    const pointValue = document.querySelector("#pointValue");
    const growthValue = document.querySelector("#growthValue");
    const growthFill = document.querySelector("#growthFill");
    const signBtn = document.querySelector("#signBtn");
    const toast = document.querySelector("#toast");
    let toastTimer;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("is-visible");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("is-visible"), 1800);
    }

    function animatePress(button) {
      button.classList.add("is-pressed");
      setTimeout(() => button.classList.remove("is-pressed"), 170);
    }

    function updateScore(extraPoints) {
      state.points += extraPoints;
      state.growth = Math.min(100000, state.growth + extraPoints * 8);
      pointValue.textContent = state.points;
      growthValue.textContent = state.growth;
      growthFill.style.width = `${Math.max(6, state.growth / 100000 * 100)}%`;
      updateRewardState();
    }

    function updateRewardState() {
      document.querySelectorAll(".reward").forEach((reward) => {
        const cost = Number(reward.dataset.cost || 0);
        reward.classList.toggle("is-disabled", state.points < cost);
        reward.setAttribute("aria-disabled", state.points < cost ? "true" : "false");
      });
    }

    document.querySelectorAll(".touchable").forEach((button) => {
      button.addEventListener("pointerdown", () => {
        if (!button.disabled) animatePress(button);
      });
    });

    signBtn.addEventListener("click", () => {
      if (state.signedToday) return;
      state.signedToday = true;
      state.signedDays += 1;
      signBtn.querySelector("span").textContent = `已签${state.signedDays}天`;
      signBtn.disabled = true;
      updateScore(6);
      showToast("签到成功，积分 +6");
    });

    document.querySelectorAll(".task-btn").forEach((button) => {
      button.addEventListener("click", () => {
        if (button.disabled) return;
        const points = Number(button.dataset.points || 0);
        const task = button.closest(".task");
        task.classList.add("is-complete");
        button.textContent = "已完成";
        button.disabled = true;
        updateScore(points);
        showToast(`任务完成，积分 +${points}`);
      });
    });

    document.querySelectorAll(".reward").forEach((reward) => {
      reward.addEventListener("click", () => {
        const cost = Number(reward.dataset.cost || 0);
        const name = reward.dataset.name || "奖励";
        if (state.points < cost) {
          reward.classList.remove("shake");
          void reward.offsetWidth;
          reward.classList.add("shake");
          showToast(`还差 ${cost - state.points} 积分可兑换 ${name}`);
          return;
        }
        state.points -= cost;
        pointValue.textContent = state.points;
        reward.disabled = true;
        reward.classList.add("is-disabled");
        updateRewardState();
        showToast(`已兑换 ${name}`);
      });
    });

    document.querySelectorAll("[data-toast]").forEach((button) => {
      button.addEventListener("click", () => {
        showToast(button.dataset.toast);
      });
    });

    document.querySelectorAll("[data-stateful]").forEach((button) => {
      button.addEventListener("click", () => {
        button.setAttribute("aria-pressed", "true");
        setTimeout(() => button.setAttribute("aria-pressed", "false"), 900);
      });
    });

    document.querySelectorAll(".nav-item").forEach((item) => {
      item.addEventListener("click", () => {
        if (item.disabled) return;
        document.querySelectorAll(".nav-item").forEach((nav) => nav.classList.remove("is-active"));
        item.classList.add("is-active");
        showToast(`已切换到${item.dataset.nav}`);
      });
    });

    function tickCountdown() {
      const taskTimer = document.querySelector("#taskTimer");
      const remainTime = document.querySelector("#remainTime");
      let taskSeconds = 14 * 3600 + 53 * 60 + 11;
      let roundSeconds = 48 * 24 * 3600 + 14 * 3600 + 53 * 60 + 8;

      setInterval(() => {
        taskSeconds = Math.max(0, taskSeconds - 1);
        roundSeconds = Math.max(0, roundSeconds - 1);
        const h = String(Math.floor(taskSeconds / 3600)).padStart(2, "0");
        const m = String(Math.floor(taskSeconds % 3600 / 60)).padStart(2, "0");
        const s = String(taskSeconds % 60).padStart(2, "0");
        taskTimer.textContent = `${h}:${m}:${s}`;

        const d = Math.floor(roundSeconds / 86400);
        const rh = String(Math.floor(roundSeconds % 86400 / 3600)).padStart(2, "0");
        const rm = String(Math.floor(roundSeconds % 3600 / 60)).padStart(2, "0");
        const rs = String(roundSeconds % 60).padStart(2, "0");
        remainTime.textContent = `${d}天${rh}:${rm}:${rs}`;
      }, 1000);
    }

    updateRewardState();
    tickCountdown();
  </script>
</body>
